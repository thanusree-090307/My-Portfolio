<!DOCTYPE html>

<html>
<head>
<title>Welcome</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#e3e5e8;
font-family:Arial;
text-align:center;
}

.container{
background:white;
padding:90px;
border-radius:15px;
box-shadow:0px 4px 10px gray;
}

.container{
animation: fade 1s ease-in;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

h1{
color:#0b0f4f;
}

h2{
color:#1c2a8a;
}

p{
color:#555;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#1c2a8a;
color:white;
cursor:pointer;
}

button:hover{
background:#0b0f4f;
}

</style>

</head>

<body>

<div class="container">

<h1>My Portfolio</h1>
<p>Click the but to view profile</p>
<a href="HomePage(protfolio).HTML">
<button>View Profile</button>
</a>

</div>

</body>
</html>
